# Пример конфига Nginx для my_treds на VPS.
# Подключить: sudo ln -s /home/USER/my_treds/deploy/nginx-my_treds.conf /etc/nginx/sites-enabled/my_treds
# Заменить YOUR_DOMAIN и порт при необходимости. Перезапуск: sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Чат с Ollama может отвечать долго (особенно с swap)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
